<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>News Scraper - Web Interface</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="container">
        <header>
            <h1>News Scraper</h1>
            <p>Search for news articles from The Hindu and BBC</p>
        </header>

        <div class="search-section">
            <div class="form-group">
                <label for="keyword">Search Keyword:</label>
                <input type="text" id="keyword" placeholder="e.g., Artificial Intelligence, Climate Change..." />
            </div>

            <div class="form-group">
                <label for="source">News Source:</label>
                <select id="source">
                    <option value="all">All Sources</option>
                    <option value="bbc">BBC</option>
                    <option value="ap news">APNews</option>
                </select>
            </div>

            <button id="searchBtn" class="btn btn-primary">
                <span class="btn-text">Search News</span>
                <span class="loader" style="display: none;"></span>
            </button>
        </div>

        <div id="status" class="status-message"></div>

        <div id="results" class="results-section" style="display: none;">
            <div class="results-header">
                <h2>Search Results</h2>
                <button id="downloadBtn" class="btn btn-secondary">Download CSV</button>
            </div>
            <div id="resultsContainer"></div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
