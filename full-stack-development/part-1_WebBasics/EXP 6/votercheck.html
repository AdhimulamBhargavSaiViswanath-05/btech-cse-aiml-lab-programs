<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Voter Check</title>
</head>
<body>
    <h2>Voter Information</h2>
    <script>
        let name = prompt("Enter your name:");
        let age = prompt("Enter your age:");
        let status = (age >= 18) ? "Eligible to Vote" : "Not Eligible to Vote";

        document.write("<table border='1' cellpadding='10'>");
        document.write("<tr><th>Name</th><th>Age</th><th>Status</th></tr>");
        document.write(`<tr><td>${name}</td><td>${age}</td><td>${status}</td></tr>`);
        document.write("</table>");
    </script>
</body>
</html>
