<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Internal and External JS</title>
    <script>
        // Internal JavaScript
        function greetInternal() {
            alert("Hello from Internal JavaScript!");
        }
    </script>
    <script src="external.js"></script> <!-- External JavaScript -->
</head>
<body>
    <h2>Internal and External JavaScript Demo</h2>
    <button onclick="greetInternal()">Click for Internal JS</button>
    <button onclick="greetExternal()">Click for External JS</button>
</body>
</html>
