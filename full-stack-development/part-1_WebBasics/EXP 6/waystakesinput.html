<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Input Methods</title>
</head>
<body>
    <h2>Input Methods in JavaScript</h2>
    <script>
        // Using prompt
        let name = prompt("Enter your name:");

        // Using HTML input element
        let userAge = 20; // Can also use input box for dynamic value
        document.write("Name: " + name + "<br>");
        document.write("Age (default): " + userAge);
    </script>
</body>
</html>
