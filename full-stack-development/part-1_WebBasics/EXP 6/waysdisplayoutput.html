<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Output Methods</title>
</head>
<body>
    <h2>Output Methods in JavaScript</h2>
    <p id="output"></p>

    <script>
        // Using alert
        alert("This is an alert box!");

        // Using console
        console.log("This is a console message.");

        // Using document.write
        document.write("This is written using document.write<br>");

        // Using innerHTML
        document.getElementById("output").innerHTML = "This is set using innerHTML.";
    </script>
</body>
</html>
