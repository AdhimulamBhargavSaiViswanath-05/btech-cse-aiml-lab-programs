<!DOCTYPE html>
<html>
<head>
  <title>Window Object</title>
</head>
<body>
  <script>
    alert("Window Width: " + window.innerWidth);
    alert("Window Height: " + window.innerHeight);
    console.log("Location: " + window.location.href);
    console.log("Current page: " + window.location.pathname);
  </script>
</body>
</html>
