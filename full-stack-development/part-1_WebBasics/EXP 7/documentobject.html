<!DOCTYPE html>
<html>
<head>
  <title>Document Object Example</title>
</head>
<body>
  <h2 id="demo"></h2>

  <script>
    document.getElementById("demo").innerHTML = "Title is: " + document.title;
    document.write("<br>URL: " + document.URL);
    document.write("<br>Last Modified: " + document.lastModified);
  </script>
</body>
</html>
