<!DOCTYPE html>
<html>
<head><title>String Methods</title></head>
<body>
  <script>
    let text = "JavaScript is awesome!";
    document.write("Length: " + text.length + "<br>");
    document.write("Uppercase: " + text.toUpperCase() + "<br>");
    document.write("Substring: " + text.substring(0, 10));
  </script>
</body>
</html>
