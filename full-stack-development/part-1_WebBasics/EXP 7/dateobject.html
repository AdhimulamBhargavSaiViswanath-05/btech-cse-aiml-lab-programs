<!DOCTYPE html>
<html>
<head><title>Date Object</title></head>
<body>
  <script>
    let today = new Date();
    document.write("Today's Date: " + today.toDateString() + "<br>");
    document.write("Year: " + today.getFullYear() + "<br>");
    document.write("Month: " + (today.getMonth() + 1));
  </script>
</body>
</html>
