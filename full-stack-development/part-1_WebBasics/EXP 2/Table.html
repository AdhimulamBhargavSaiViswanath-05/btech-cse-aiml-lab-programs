<!DOCTYPE html>
<html>
<head>
    <title>HTML Table Example</title>
</head>
<body>
    <h2>Student Marks Table</h2>
    <table border="1" cellspacing="5" cellpadding="5">
        <tr>
            <th>Student Name</th>
            <th>Subjects</th>
            <th>Marks</th>
        </tr>
        <tr>
            <td rowspan="3">Bhargav Sai</td>
            <td>Math</td>
            <td>90</td>
        </tr>
        <tr>
            <td>Science</td>
            <td>90</td>
        </tr>
        <tr>
            <td>Social</td>
            <td>90</td>
        </tr>
        <tr>
            <td colspan="2">Total</td>
            <td>270</td>
        </tr>
    </table>
</body>
</html>
