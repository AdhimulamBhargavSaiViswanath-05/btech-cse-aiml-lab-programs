<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Colors</title>
    <style>
        .named-color { color: red; }
        .hex-color { color: #3498db; }
        .rgb-color { color: rgb(46, 204, 113); }
        .rgba-color { color: rgba(255, 165, 0, 0.8); }
        .hsl-color { color: hsl(300, 76%, 50%); }
    </style>
</head>
<body>
    <h2 class="named-color">This is Red (Named Color)</h2>
    <h2 class="hex-color">This is Blue (#Hex Code)</h2>
    <h2 class="rgb-color">This is Green (RGB)</h2>
    <h2 class="rgba-color">This is Orange (RGBA with Transparency)</h2>
    <h2 class="hsl-color">This is Purple (HSL)</h2>
</body>
</html>
