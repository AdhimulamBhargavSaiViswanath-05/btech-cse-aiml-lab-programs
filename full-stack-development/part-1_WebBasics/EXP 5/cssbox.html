<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Box Model</title>
    <style>
        .box {
            width: 300px;
            height: 100px;
            background-color: lightblue;
            border: 5px solid black;  /* Border */
            padding: 20px;  /* Padding */
            margin: 30px;  /* Margin */
        }
    </style>
</head>
<body>
    <h2>CSS Box Model Demonstration</h2>
    <div class="box">Content inside the box (with padding, border, and margin)</div>
</body>
</html>
