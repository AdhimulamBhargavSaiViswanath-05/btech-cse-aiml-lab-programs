<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Background Image Fixed</title>
    <style>
        body {
            background-image: url('https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTpNgz1ix3BX5wSeveNtaCY37RwCWs5PlxOxw&s'); /* Replace with actual image */
            background-position: center 50%;
            background-repeat: no-repeat;
            background-attachment: fixed;
            height: 200vh; /* To show scrolling effect */
        }
    </style>
</head>
<body>
    <h2>Scroll to see the fixed background image effect.</h2>
</body>
</html>
