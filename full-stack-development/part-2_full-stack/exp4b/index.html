<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Student SPA using RESTful API</title>
  <style>
    body { font-family: Arial; margin: 30px; }
    input { margin: 5px; padding: 5px; }
    button { padding: 6px 12px; margin: 5px; }
    table { border-collapse: collapse; margin-top: 20px; width: 60%; }
    th, td { border: 1px solid #ddd; padding: 8px; text-align: center; }
  </style>
</head>
<body>
  <h2>🎓 Student Management (SPA using REST API)</h2>

  <input type="text" id="name" placeholder="Name">
  <input type="text" id="course" placeholder="Course">
  <input type="number" id="marks" placeholder="Marks">
  <button onclick="addStudent()">Add Student</button>

  <table id="studentTable">
    <thead>
      <tr><th>Name</th><th>Course</th><th>Marks</th><th>Action</th></tr>
    </thead>
    <tbody></tbody>
  </table>

  <script>
    const apiUrl = "http://localhost:4000/api/students";

    async function loadStudents() {
      const res = await fetch(apiUrl);
      const students = await res.json();
      const tableBody = document.querySelector("#studentTable tbody");
      tableBody.innerHTML = "";
      students.forEach(s => {
        tableBody.innerHTML += `
          <tr>
            <td>${s.name}</td>
            <td>${s.course}</td>
            <td>${s.marks}</td>
            <td><button onclick="deleteStudent('${s._id}')">Delete</button></td>
          </tr>
        `;
      });
    }

    async function addStudent() {
      const name = document.getElementById("name").value;
      const course = document.getElementById("course").value;
      const marks = document.getElementById("marks").value;
      await fetch(apiUrl, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ name, course, marks })
      });
      loadStudents();
    }

    async function deleteStudent(id) {
      await fetch(`${apiUrl}/${id}`, { method: "DELETE" });
      loadStudents();
    }

    loadStudents();
  </script>
</body>
</html>
